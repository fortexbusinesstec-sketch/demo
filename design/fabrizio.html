<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fabrizio · Azur Constructora</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    :root {
      --red: #c12128;
      --red-hover: #a01b21;
      --gold: #ffd266;
      --green: #38A169;
      --red-bg: #E53E3E;
      --yellow: #D69E2E;
      --purple: #805AD5;
      --gray-soft: #F7FAFC;
      --card-radius: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--gray-soft);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    .navbar-crm {
      background: var(--red);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar-crm .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
      text-decoration: none;
    }
    .navbar-crm .brand svg { width: 22px; height: 22px; stroke-width: 1.8; }
    .navbar-crm .user-area {
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(255,255,255,0.85);
      font-size: 14px;
    }
    .navbar-crm .user-area .user-name { font-weight: 500; }
    .navbar-crm .user-area .user-role {
      font-size: 12px;
      opacity: 0.6;
      display: block;
    }
    .btn-logout {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 6px 14px;
      border-radius: 10px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.2); }

    .filter-section {
      padding: 16px 16px 8px;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .filter-section::-webkit-scrollbar { display: none; }
    .filter-pill {
      flex-shrink: 0;
      padding: 10px 20px;
      border-radius: 999px;
      border: 1.5px solid #E2E8F0;
      background: #fff;
      font-size: 14px;
      font-weight: 500;
      color: #4A5568;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .filter-pill:hover { border-color: var(--red); color: var(--red); }
    .filter-pill.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }
    .filter-pill .count-badge {
      background: rgba(0,0,0,0.08);
      border-radius: 999px;
      padding: 1px 8px;
      font-size: 12px;
      font-weight: 600;
    }
    .filter-pill.active .count-badge { background: rgba(255,255,255,0.2); }

    .stats-bar {
      padding: 8px 16px 12px;
      font-size: 14px;
      color: #718096;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stats-bar strong { color: var(--red); }
    .content-area { padding: 0 16px; }

    .leads-table-wrap { display: none; background: #fff; border-radius: var(--card-radius); border: 1px solid #E2E8F0; overflow: hidden; }
    .leads-table { width: 100%; border-collapse: collapse; }
    .leads-table th {
      text-align: left; padding: 14px 16px; font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em; color: #718096;
      background: #F7FAFC; border-bottom: 1px solid #E2E8F0;
    }
    .leads-table td {
      padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #EDF2F7; vertical-align: middle;
    }
    .leads-table tr:last-child td { border-bottom: none; }
    .leads-table .lead-name { font-weight: 600; color: var(--red); }
    .leads-table .lead-phone { font-family: ui-monospace, monospace; font-size: 13px; color: #4A5568; }
    .leads-table .lead-details { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #718096; font-size: 13px; }
    .leads-table .lead-next-action { font-size: 13px; color: #718096; }
    .btn-manage {
      padding: 8px 16px; border-radius: 10px; border: 1px solid var(--red);
      background: transparent; color: var(--red); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px;
    }
    .btn-manage:hover { background: var(--red); color: #fff; }

    .leads-cards { display: flex; flex-direction: column; gap: 12px; }
    .lead-card {
      background: #fff; border-radius: var(--card-radius); border: 1px solid #E2E8F0;
      padding: 16px; transition: box-shadow 0.15s;
    }
    .lead-card:active { box-shadow: 0 0 0 2px var(--red); }
    .lead-card .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .lead-card .card-name { font-weight: 600; font-size: 16px; color: var(--red); }
    .lead-card .card-phone { font-family: ui-monospace, monospace; font-size: 13px; color: #4A5568; margin-top: 2px; }
    .lead-card .card-details { font-size: 13px; color: #718096; margin-bottom: 10px; line-height: 1.4; }
    .lead-card .card-footer { display: flex; justify-content: space-between; align-items: center; }
    .lead-card .card-next { font-size: 12px; color: #A0AEC0; }
    .lead-card .btn-manage-mobile {
      padding: 10px 18px; border-radius: 10px; border: 1px solid var(--red);
      background: var(--red); color: #fff; font-size: 13px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
    }

    .estado-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; white-space: nowrap;
    }
    .estado-badge.nuevo { background: #FED7D7; color: var(--red); }
    .estado-badge.en_seguimiento { background: #FEFCBF; color: #975A16; }
    .estado-badge.pendiente_cita_virtual { background: #E9D8FD; color: #6B46C1; }
    .estado-badge.rechazado { background: #E2E8F0; color: #4A5568; }
    .estado-badge.cita_creada { background: #C6F6D5; color: #276749; }

    .fab {
      position: fixed; bottom: 24px; right: 24px;
      width: 60px; height: 60px; border-radius: 50%;
      background: var(--green); color: #fff; border: none;
      box-shadow: 0 6px 20px rgba(56,161,105,0.4);
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s; z-index: 50;
    }
    .fab:active { transform: scale(0.92); }

    .modal-content { border-radius: 20px; border: none; box-shadow: 0 24px 64px rgba(0,0,0,0.2); }
    .modal-header { border-bottom: 1px solid #E2E8F0; padding: 20px 24px 16px; }
    .modal-header .modal-title { font-weight: 700; color: var(--red); font-size: 20px; }
    .modal-body { padding: 20px 24px; }
    .modal-footer { border-top: 1px solid #E2E8F0; padding: 16px 24px; }
    .modal-footer .btn { padding: 12px 24px; border-radius: 12px; font-weight: 600; }

    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .action-btn {
      padding: 16px 12px; border-radius: 14px; border: 1.5px solid #E2E8F0;
      background: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center; line-height: 1.2;
    }
    .action-btn:active { transform: scale(0.97); }
    .action-btn svg { width: 24px; height: 24px; }
    .action-btn.action-yellow { border-color: var(--yellow); color: var(--yellow); }
    .action-btn.action-yellow:hover { background: #FFFFF0; }
    .action-btn.action-red { border-color: var(--red-bg); color: var(--red-bg); }
    .action-btn.action-red:hover { background: #FFF5F5; }
    .action-btn.action-green { border-color: var(--green); color: var(--green); }
    .action-btn.action-green:hover { background: #F0FFF4; }
    .action-btn.action-gray { border-color: #CBD5E0; color: #4A5568; }
    .action-btn.action-gray:hover { background: #F7FAFC; }

    .history-section { border-top: 1px solid #E2E8F0; padding-top: 16px; }
    .history-section h6 {
      font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
      color: #A0AEC0; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
    }
    .timeline { position: relative; }
    .timeline-item { position: relative; padding-left: 20px; padding-bottom: 14px; }
    .timeline-item:last-child { padding-bottom: 0; }
    .timeline-item::before {
      content: ''; position: absolute; left: 4px; top: 6px;
      width: 8px; height: 8px; border-radius: 50%; background: var(--red);
    }
    .timeline-item::after {
      content: ''; position: absolute; left: 7.5px; top: 16px; bottom: 0;
      width: 1px; background: #E2E8F0;
    }
    .timeline-item:last-child::after { display: none; }
    .timeline-item .t-date { font-size: 11px; color: #A0AEC0; margin-bottom: 2px; font-family: ui-monospace, monospace; }
    .timeline-item .t-text { font-size: 14px; color: #4A5568; line-height: 1.4; }

    .extra-input-row { margin-bottom: 16px; }
    .extra-input-row label { font-size: 13px; font-weight: 600; color: #4A5568; margin-bottom: 6px; display: block; }

    @media (min-width: 768px) {
      .leads-table-wrap { display: block; }
      .leads-cards { display: none; }
      .filter-section { padding: 20px 24px 12px; }
      .stats-bar { padding: 8px 24px 16px; }
      .content-area { padding: 0 24px; }
      body { padding-bottom: 40px; }
    }
    @media (max-width: 767.98px) {
      .leads-table-wrap { display: none; }
      .leads-cards { display: flex; }
    }

    .fw-600 { font-weight: 600; }
    .text-navy { color: var(--red); }
    .d-none { display: none !important; }
  </style>
</head>
<body>

  <nav class="navbar-crm" data-od-id="navbar">
    <a href="index.html" class="brand">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Azur Constructora
    </a>
    <div class="user-area">
      <div>
        <span class="user-name">Fabrizio</span>
        <span class="user-role">Asistente</span>
      </div>
      <button class="btn-logout" onclick="cerrarSesion()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Salir
      </button>
    </div>
  </nav>

  <div class="filter-section" data-od-id="filters">
    <button class="filter-pill active" data-filter="todos" onclick="filtrar('todos')">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Todos
      <span class="count-badge" id="count-todos">0</span>
    </button>
    <button class="filter-pill" data-filter="pendientes_llamar" onclick="filtrar('pendientes_llamar')">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      Pendientes de llamar
      <span class="count-badge" id="count-pendientes_llamar">0</span>
    </button>
    <button class="filter-pill" data-filter="pendiente_cita_virtual" onclick="filtrar('pendiente_cita_virtual')">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Pendientes Cita Virtual
      <span class="count-badge" id="count-pendiente_cita_virtual">0</span>
    </button>
  </div>

  <div class="stats-bar" data-od-id="stats">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>
    <span id="stats-text">Cargando...</span>
  </div>

  <div class="content-area" data-od-id="lead-list">
    <div class="leads-table-wrap">
      <table class="leads-table">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Teléfono</th>
            <th>Detalles</th>
            <th>Estado</th>
            <th>Próxima gestión</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <div class="leads-cards" id="cards-container"></div>
    <div id="empty-state" class="d-none" style="text-align:center;padding:48px 24px;color:#A0AEC0;">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:12px;opacity:0.5;"><path d="M22 12h-6l-2 3H10l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
      <p style="font-size:16px;font-weight:500;color:#718096;">No hay leads en esta categoría</p>
    </div>
  </div>

  <button class="fab" onclick="abrirNuevoLead()" aria-label="Nuevo Lead" data-od-id="fab-new">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <div class="modal fade" id="modalNuevoLead" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Nuevo Lead</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="inputNombre" class="form-label fw-600">Nombre</label>
            <input type="text" class="form-control form-control-lg" id="inputNombre" placeholder="Nombre del cliente" />
          </div>
          <div class="mb-3">
            <label for="inputTelefono" class="form-label fw-600">Teléfono</label>
            <input type="text" class="form-control form-control-lg" id="inputTelefono" placeholder="+52 555 123 4567" />
          </div>
          <div class="mb-3">
            <label for="inputDetalles" class="form-label fw-600">Detalles</label>
            <textarea class="form-control form-control-lg" id="inputDetalles" rows="4" placeholder="Toda la información del lead..."></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn" style="background:var(--red);color:#fff;border:none;" onclick="guardarNuevoLead()">Guardar Lead</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalGestionar" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="gestionar-title">Gestionar Lead</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="gestionar-info" class="mb-3"></div>

          <div class="action-grid">
            <button class="action-btn action-yellow" onclick="accionLlamarDespues()">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              Llamar después
            </button>
            <button class="action-btn action-red" onclick="accionNoInteresado()">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
              No interesado
            </button>
            <button class="action-btn action-green" onclick="accionReunionVirtual()">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              Quiere reunión virtual
            </button>
            <button class="action-btn action-gray" onclick="accionAgregarNota()">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              Agregar nota
            </button>
          </div>

          <div id="extra-input-area" class="extra-input-row d-none"></div>

          <div class="history-section" id="history-section">
            <h6>
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              Historial de seguimiento
            </h6>
            <div class="timeline" id="timeline-container">
              <p style="color:#A0AEC0;font-size:13px;">Sin seguimientos registrados.</p>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API = {
      _delay(ms = 200) { return new Promise(r => setTimeout(r, ms)); },
      _getLeads() { return JSON.parse(localStorage.getItem('leads') || '[]'); },
      _saveLeads(leads) { localStorage.setItem('leads', JSON.stringify(leads)); },

      async getLeads(filtroEstado) {
        await this._delay();
        let leads = this._getLeads();
        if (filtroEstado === 'pendientes_llamar') {
          leads = leads.filter(l => l.estado === 'nuevo' || l.estado === 'en_seguimiento');
        } else if (filtroEstado === 'pendiente_cita_virtual') {
          leads = leads.filter(l => l.estado === 'pendiente_cita_virtual');
        } else if (filtroEstado && filtroEstado !== 'todos') {
          leads = leads.filter(l => l.estado === filtroEstado);
        }
        return leads;
      },

      async getLead(id) {
        await this._delay(100);
        const leads = this._getLeads();
        return leads.find(l => l.id === Number(id)) || null;
      },

      async createLead(data) {
        await this._delay(300);
        const leads = this._getLeads();
        const maxId = leads.reduce((max, l) => Math.max(max, l.id), 0);
        const newLead = {
          id: maxId + 1,
          nombre: data.nombre,
          telefono: data.telefono,
          detalles: data.detalles,
          preferencia_reunion: null,
          estado: 'nuevo',
          fecha_ingreso: new Date().toISOString().slice(0, 10),
          proxima_gestion: null,
          seguimientos: []
        };
        leads.unshift(newLead);
        this._saveLeads(leads);
        return newLead;
      },

      async updateLead(id, updates) {
        await this._delay(250);
        const leads = this._getLeads();
        const idx = leads.findIndex(l => l.id === Number(id));
        if (idx === -1) throw new Error('Lead no encontrado');
        leads[idx] = { ...leads[idx], ...updates };
        this._saveLeads(leads);
        return leads[idx];
      },

      async addSeguimiento(id, nota) {
        await this._delay(200);
        const leads = this._getLeads();
        const idx = leads.findIndex(l => l.id === Number(id));
        if (idx === -1) throw new Error('Lead no encontrado');
        const seguimiento = {
          fecha: new Date().toISOString().slice(0, 10) + ' ' + new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' }),
          nota: nota
        };
        leads[idx].seguimientos.push(seguimiento);
        this._saveLeads(leads);
        return leads[idx];
      }
    };

    let filtroActual = 'todos';
    let gestionandoId = null;
    let modalNuevo, modalGestionar;

    document.addEventListener('DOMContentLoaded', () => {
      modalNuevo = new bootstrap.Modal('#modalNuevoLead');
      modalGestionar = new bootstrap.Modal('#modalGestionar');
      renderizar();
    });

    async function renderizar() {
      const leads = await API.getLeads(filtroActual);
      const todas = await API.getLeads('todos');

      document.getElementById('count-todos').textContent = todas.length;
      document.getElementById('count-pendientes_llamar').textContent = todas.filter(l => l.estado === 'nuevo' || l.estado === 'en_seguimiento').length;
      document.getElementById('count-pendiente_cita_virtual').textContent = todas.filter(l => l.estado === 'pendiente_cita_virtual').length;

      document.getElementById('stats-text').textContent = `${leads.length} lead${leads.length !== 1 ? 's' : ''} encontrado${leads.length !== 1 ? 's' : ''}`;

      const tbody = document.getElementById('table-body');
      const cards = document.getElementById('cards-container');
      const emptyState = document.getElementById('empty-state');

      if (leads.length === 0) {
        tbody.innerHTML = '';
        cards.innerHTML = '';
        emptyState.classList.remove('d-none');
        document.querySelector('.leads-table-wrap')?.classList.add('d-none');
        document.getElementById('cards-container')?.classList.add('d-none');
        return;
      }
      emptyState.classList.add('d-none');
      document.querySelector('.leads-table-wrap')?.classList.remove('d-none');
      document.getElementById('cards-container')?.classList.remove('d-none');

      tbody.innerHTML = leads.map(l => `
        <tr>
          <td><span class="lead-name">${esc(l.nombre)}</span></td>
          <td><span class="lead-phone">${esc(l.telefono)}</span></td>
          <td><span class="lead-details" title="${esc(l.detalles)}">${esc(l.detalles)}</span></td>
          <td>${badgeEstado(l.estado)}</td>
          <td><span class="lead-next-action">${l.proxima_gestion ? esc(l.proxima_gestion) : '\u2014'}</span></td>
          <td>
            <button class="btn-manage" onclick="abrirGestionar(${l.id})">
              Gestionar
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </td>
        </tr>
      `).join('');

      cards.innerHTML = leads.map(l => `
        <div class="lead-card" onclick="abrirGestionar(${l.id})">
          <div class="card-header">
            <div>
              <div class="card-name">${esc(l.nombre)}</div>
              <div class="card-phone">${esc(l.telefono)}</div>
            </div>
            ${badgeEstado(l.estado)}
          </div>
          <div class="card-details">${esc(l.detalles)}</div>
          <div class="card-footer">
            <span class="card-next">${l.proxima_gestion ? '\ud83d\udcc5 ' + esc(l.proxima_gestion) : '\u2014'}</span>
            <button class="btn-manage-mobile" onclick="event.stopPropagation();abrirGestionar(${l.id})">
              Gestionar
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </div>
      `).join('');
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function badgeEstado(estado) {
      const labels = {
        nuevo: 'Nuevo',
        en_seguimiento: 'Seguimiento',
        pendiente_cita_virtual: 'Cita Virtual',
        rechazado: 'Rechazado',
        cita_creada: 'Cita Creada'
      };
      return `<span class="estado-badge ${estado}">${labels[estado] || estado}</span>`;
    }

    async function filtrar(filtro) {
      filtroActual = filtro;
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      document.querySelector(`.filter-pill[data-filter="${filtro}"]`).classList.add('active');
      await renderizar();
    }

    function abrirNuevoLead() {
      document.getElementById('inputNombre').value = '';
      document.getElementById('inputTelefono').value = '';
      document.getElementById('inputDetalles').value = '';
      modalNuevo.show();
    }

    async function guardarNuevoLead() {
      const nombre = document.getElementById('inputNombre').value.trim();
      const telefono = document.getElementById('inputTelefono').value.trim();
      const detalles = document.getElementById('inputDetalles').value.trim();
      if (!nombre) { alert('El nombre es obligatorio'); return; }
      await API.createLead({ nombre, telefono, detalles });
      modalNuevo.hide();
      await renderizar();
    }

    async function abrirGestionar(id) {
      gestionandoId = id;
      const lead = await API.getLead(id);
      if (!lead) return;
      document.getElementById('gestionar-title').textContent = 'Gestionar: ' + lead.nombre;

      document.getElementById('gestionar-info').innerHTML = `
        <div class="row g-2 mb-2">
          <div class="col-6"><small class="text-muted">Nombre</small><div class="fw-600">${esc(lead.nombre)}</div></div>
          <div class="col-6"><small class="text-muted">Tel\u00e9fono</small><div class="fw-600">${esc(lead.telefono)}</div></div>
        </div>
        <div class="mb-2">
          <small class="text-muted">Detalles</small>
          <div>${esc(lead.detalles)}</div>
        </div>
        <div class="row g-2">
          <div class="col-4">
            <small class="text-muted">Estado</small>
            <div>${badgeEstado(lead.estado)}</div>
          </div>
          <div class="col-4">
            <small class="text-muted">Ingreso</small>
            <div style="font-size:14px;">${lead.fecha_ingreso}</div>
          </div>
          <div class="col-4">
            <small class="text-muted">Pr\u00f3xima gesti\u00f3n</small>
            <div style="font-size:14px;">${lead.proxima_gestion || '\u2014'}</div>
          </div>
        </div>
        ${lead.preferencia_reunion ? `
        <div class="mt-2 p-2" style="background:#FFFFF0;border-radius:10px;border:1px solid #F6E05E;">
          <small class="text-muted">Preferencia de reuni\u00f3n:</small>
          <div class="fw-600">${esc(lead.preferencia_reunion)}</div>
        </div>` : ''}
      `;

      renderTimeline(lead.seguimientos);
      document.getElementById('extra-input-area').classList.add('d-none');
      modalGestionar.show();
    }

    function renderTimeline(seguimientos) {
      const container = document.getElementById('timeline-container');
      if (!seguimientos || seguimientos.length === 0) {
        container.innerHTML = '<p style="color:#A0AEC0;font-size:13px;">Sin seguimientos registrados.</p>';
        return;
      }
      container.innerHTML = seguimientos.map(s => `
        <div class="timeline-item">
          <div class="t-date">${esc(s.fecha)}</div>
          <div class="t-text">${esc(s.nota)}</div>
        </div>
      `).join('');
    }

    function accionLlamarDespues() {
      const area = document.getElementById('extra-input-area');
      area.innerHTML = `
        <label>Fecha de pr\u00f3xima gesti\u00f3n</label>
        <div class="input-group">
          <input type="date" class="form-control form-control-lg" id="inputProximaGestion" value="${new Date().toISOString().slice(0,10)}" />
          <button class="btn btn-warning fw-600" onclick="confirmarLlamarDespues()">Guardar</button>
        </div>
      `;
      area.classList.remove('d-none');
    }

    async function confirmarLlamarDespues() {
      const fecha = document.getElementById('inputProximaGestion').value;
      if (!fecha) { alert('Selecciona una fecha'); return; }
      await API.updateLead(gestionandoId, { estado: 'en_seguimiento', proxima_gestion: fecha });
      await API.addSeguimiento(gestionandoId, `Llamar despu\u00e9s programado para ${fecha}`);
      modalGestionar.hide();
      await renderizar();
    }

    async function accionNoInteresado() {
      if (!confirm('\u00bfMarcar como "No interesado"?')) return;
      await API.updateLead(gestionandoId, { estado: 'rechazado' });
      await API.addSeguimiento(gestionandoId, 'Cliente no interesado');
      modalGestionar.hide();
      await renderizar();
    }

    function accionReunionVirtual() {
      const area = document.getElementById('extra-input-area');
      area.innerHTML = `
        <label>Preferencia de d\u00eda/hora del cliente <span class="text-danger">*</span></label>
        <div class="input-group">
          <input type="text" class="form-control form-control-lg" id="inputPreferencia" placeholder="Ej: Jueves 10 am por Google Meet" />
          <button class="btn btn-success fw-600" onclick="confirmarReunionVirtual()">Guardar</button>
        </div>
      `;
      area.classList.remove('d-none');
    }

    async function confirmarReunionVirtual() {
      const preferencia = document.getElementById('inputPreferencia').value.trim();
      if (!preferencia) { alert('La preferencia de reuni\u00f3n es obligatoria'); return; }
      await API.updateLead(gestionandoId, { estado: 'pendiente_cita_virtual', preferencia_reunion: preferencia });
      await API.addSeguimiento(gestionandoId, `Cliente solicita reuni\u00f3n virtual: ${preferencia}`);
      modalGestionar.hide();
      await renderizar();
    }

    function accionAgregarNota() {
      const area = document.getElementById('extra-input-area');
      area.innerHTML = `
        <label>Nota / comentario</label>
        <div class="input-group">
          <textarea class="form-control" id="inputNota" rows="3" placeholder="Escribe un comentario..."></textarea>
          <button class="btn btn-secondary fw-600" onclick="confirmarNota()">Guardar</button>
        </div>
      `;
      area.classList.remove('d-none');
    }

    async function confirmarNota() {
      const nota = document.getElementById('inputNota').value.trim();
      if (!nota) { alert('Escribe una nota'); return; }
      await API.addSeguimiento(gestionandoId, nota);
      const lead = await API.getLead(gestionandoId);
      renderTimeline(lead.seguimientos);
      document.getElementById('extra-input-area').classList.add('d-none');
      await renderizar();
    }

    function cerrarSesion() {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
