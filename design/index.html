<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Azur Constructora e Inmobiliaria</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
      :root {
        --red: #c12128;
        --red-hover: #a01b21;
        --red-dark: #8a161c;
        --gold: #ffd266;
        --dark: #292134;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, var(--red-dark) 0%, var(--red) 50%, #d42f36 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          "Plus Jakarta Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
        padding: 20px;
      }
      .login-card {
        background: rgba(255, 255, 255, 0.97);
        border-radius: 24px;
        padding: 48px 36px;
        max-width: 480px;
        width: 100%;
        box-shadow:
          0 24px 64px rgba(0, 0, 0, 0.3),
          0 0 0 1px rgba(255, 255, 255, 0.06);
      }
      .logo-icon {
        width: 56px;
        height: 56px;
        background: var(--red);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
      }
      .logo-icon svg {
        width: 30px;
        height: 30px;
        color: #fff;
        stroke-width: 1.8;
      }
      .login-title {
        font-size: 26px;
        font-weight: 700;
        color: var(--red);
        text-align: center;
        margin-bottom: 2px;
        letter-spacing: -0.02em;
        line-height: 1.2;
      }
      .login-sub {
        font-size: 14px;
        color: #718096;
        text-align: center;
        margin-bottom: 32px;
      }
      .btn-login {
        display: flex;
        align-items: center;
        gap: 16px;
        width: 100%;
        padding: 20px 24px;
        border: none;
        border-radius: 16px;
        font-size: 18px;
        font-weight: 600;
        color: #fff;
        cursor: pointer;
        transition:
          transform 0.15s,
          box-shadow 0.15s,
          background 0.15s;
        text-align: left;
      }
      .btn-login:active {
        transform: scale(0.98);
      }
      .btn-login .btn-icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        background: rgba(255, 255, 255, 0.15);
      }
      .btn-login .btn-icon svg {
        width: 24px;
        height: 24px;
        color: #fff;
      }
      .btn-login .btn-label {
        line-height: 1.2;
      }
      .btn-login .btn-label small {
        display: block;
        font-size: 13px;
        font-weight: 400;
        opacity: 0.75;
        margin-top: 2px;
      }
      .btn-fabrizio {
        background: linear-gradient(135deg, var(--red), #d42f36);
        margin-bottom: 16px;
      }
      .btn-fabrizio:hover {
        background: linear-gradient(135deg, #d42f36, var(--red));
        box-shadow: 0 8px 24px rgba(193, 33, 40, 0.35);
      }
      .btn-henrry {
        background: linear-gradient(135deg, var(--dark), #3d2f4a);
      }
      .btn-henrry:hover {
        background: linear-gradient(135deg, #3d2f4a, var(--dark));
        box-shadow: 0 8px 24px rgba(41, 33, 52, 0.35);
      }
      .login-footer {
        margin-top: 28px;
        text-align: center;
        font-size: 12px;
        color: #a0aec0;
      }
      @media (max-width: 480px) {
        .login-card {
          padding: 32px 24px;
          border-radius: 20px;
        }
        .login-title {
          font-size: 22px;
        }
        .btn-login {
          padding: 16px 20px;
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="logo-icon">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="30"
          height="30"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
      </div>
      <h1 class="login-title">Azur Constructora<br />e Inmobiliaria</h1>
      <p class="login-sub">Sistema de gestión de clientes</p>

      <button class="btn-login btn-fabrizio" onclick="entrarComo('fabrizio')">
        <span class="btn-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </span>
        <span class="btn-label">
          Asistente
          <small>Asistente · Registro y seguimiento de leads</small>
        </span>
      </button>

      <button class="btn-login btn-henrry" onclick="entrarComo('henrry')">
        <span class="btn-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
            <path d="M8 21h8" />
            <path d="M12 17v4" />
          </svg>
        </span>
        <span class="btn-label">
          Ingresar como Henrry
          <small>Jefe · Coordinación y reporte de seguimiento</small>
        </span>
      </button>

      <p class="login-footer">&copy; 2026 Azur Constructora e Inmobiliaria</p>
    </div>

      initMockData();

      function entrarComo(usuario) {
        if (usuario === "fabrizio") {
          window.location.href = "fabrizio.html";
        } else {
          window.location.href = "henrry.html";
        }
      }
    </script>
  </body>
</html>
